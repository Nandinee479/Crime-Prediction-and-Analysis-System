<!DOCTYPE html>
<html>
<head>
 <title>Add Crime - Crime Prediction System</title>
 <link rel="stylesheet" href="style.css">
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

<div class="sidebar">

<div class="sidebar-header">
 <h2><i class="fas fa-shield-alt"></i> Crime System</h2>
</div>

<nav>
 <a href="dashboard.html">
 <span class="icon"><i class="fas fa-home"></i></span>
 <span>Dashboard</span>
 </a>
 <a href="addcrime.html" class="active">
 <span class="icon"><i class="fas fa-plus-circle"></i></span>
 <span>Add Crime</span>
 </a>
 <a href="viewcrime.html">
 <span class="icon"><i class="fas fa-list"></i></span>
 <span>View Crimes</span>
 </a>
 <a href="statistics.html">
 <span class="icon"><i class="fas fa-chart-bar"></i></span>
 <span>Statistics</span>
 </a>
 <a href="prediction.html">
 <span class="icon"><i class="fas fa-brain"></i></span>
 <span>Prediction</span>
 </a>
 <a href="hotspot.html">
 <span class="icon"><i class="fas fa-map-marker-alt"></i></span>
 <span>Hotspots</span>
 </a>
 <a href="login.html" style="margin-top:40px;">
 <span class="icon"><i class="fas fa-sign-out-alt"></i></span>
 <span>Logout</span>
 </a>
</nav>

</div>

<div class="topbar">
 <h1><i class="fas fa-plus-circle"></i> Add New Crime Record</h1>
 <div class="topbar-actions">
 <div class="user-menu">
 <div class="user-avatar">A</div>
 <div class="user-info">
 <span class="name">Admin User</span>
 <span class="role">Administrator</span>
 </div>
 </div>
 </div>
</div>

<div class="main">

<div class="page-header">
 <h2>Crime Information</h2>
 <div class="actions">
 <button class="btn btn-secondary">
 <i class="fas fa-arrow-left"></i> Back
 </button>
 </div>
</div>

<div class="section" style="max-width:700px;">

 <div class="form-group">
 <label><i class="fas fa-tag"></i> Crime Type</label>
 <select>
 <option value="">Select Crime Type</option>
 <option>Theft</option>
 <option>Robbery</option>
 <option>Assault</option>
 <option>Fraud</option>
 <option>Vandalism</option>
 <option>Kidnapping</option>
 <option>Cyber Crime</option>
 </select>
 </div>

 <div class="form-group">
 <label><i class="fas fa-map-marker-alt"></i> Location</label>
 <div class="input-with-icon">
 <i class="fas fa-map-marker-alt"></i>
 <input type="text" placeholder="Enter detailed location">
 </div>
 </div>

 <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
 <div class="form-group">
 <label><i class="fas fa-calendar"></i> Date</label>
 <input type="date">
 </div>

 <div class="form-group">
 <label><i class="fas fa-clock"></i> Time</label>
 <input type="time">
 </div>
 </div>

 <div class="form-group">
 <label><i class="fas fa-exclamation-triangle"></i> Severity</label>
 <select>
 <option value="">Select Severity</option>
 <option>Low</option>
 <option>Medium</option>
 <option>High</option>
 <option>Critical</option>
 </select>
 </div>

 <div class="form-group">
 <label><i class="fas fa-align-left"></i> Description</label>
 <textarea rows="4" placeholder="Enter detailed description of the incident..."></textarea>
 </div>

 <div class="form-group">
 <label><i class="fas fa-user"></i> Victim Name (Optional)</label>
 <div class="input-with-icon">
 <i class="fas fa-user"></i>
 <input type="text" placeholder="Enter victim name">
 </div>
 </div>

 <div style="display:flex;gap:12px;margin-top:24px;">
 <button class="btn btn-primary" style="flex:1;">
 <i class="fas fa-save"></i> Submit Record
 </button>
 <button class="btn btn-secondary">
 <i class="fas fa-undo"></i> Reset
 </button>
 </div>

</div>

</div>

</body>
</html>
